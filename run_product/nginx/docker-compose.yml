services:
  nginx:
    image: nhothoang/water-app-nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - nginx_data:/var/cache/nginx
    networks:
      - app_network
    restart: unless-stopped
volumes:
  nginx_data:
    driver: local
    name: nginx_data
networks:
  app_network:
    driver: bridge
    external: true
