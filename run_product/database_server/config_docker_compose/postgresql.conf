# ========================
# 🔧 PostgreSQL Performance Tuning
# ========================

# --- MEMORY SETTINGS ---
shared_buffers = 2GB              # Cache nội bộ DB (~25% RAM)
work_mem = 16MB                   # Cho mỗi query sort/hash
maintenance_work_mem = 512MB      # Cho VACUUM, CREATE INDEX
effective_cache_size = 6GB        # Hints cho query planner biết RAM sẵn có

# --- WAL / CHECKPOINT ---
wal_buffers = 32MB
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
synchronous_commit = off          # ⚠️ nhanh hơn, có thể mất vài ms dữ liệu khi crash
fsync = on                        # nên bật để không mất dữ liệu

# --- CONNECTIONS ---
max_connections = 200             # nên kết hợp connection pool trong app

# --- QUERY PLANNER ---
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200
default_statistics_target = 100

# --- LOGGING ---
logging_collector = on
log_statement = none
log_min_duration_statement = 1000  # log query chậm >1s
log_directory = 'logs' 

# --- OTHER ---
listen_addresses = '*'
