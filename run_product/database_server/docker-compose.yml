services:
  postgres:
    image: nhothoang/postgre18.0:18.0
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - ./config_docker_compose/postgree.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./config_docker_compose/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]
    shm_size: 2g
    networks:
      - app_network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  minio:
    image: nhothoang/minio:07092025
    container_name: minio-server
    restart: unless-stopped
    env_file:
      - ./config_docker_compose/minio.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - minio_cache:/cache
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    name: postgres_data
  minio_data:
    name: minio_data
  minio_cache:
    name: minio_cache
networks:
  app_network:
    driver: bridge
    external: true
