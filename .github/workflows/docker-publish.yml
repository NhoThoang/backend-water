name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag cho Docker Image (vd: v1.0.0, latest). Nếu để trống sẽ mặc định là latest.'
        required: false
        default: 'latest'
    # Bật workflow_dispatch sẽ cho phép bạn chọn nhánh (branch) thủ công bằng nút "Run workflow" trên GitHub Actions UI.

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .  # Thay đổi thành './backend_water' nếu thư mục gốc của Repo là water_app
          file: ./Dockerfile  # Tương tự, đổi đường dẫn nếu repo gốc khác
          push: true
          tags: |
            nhothoang/water-app-backend:${{ github.event.inputs.image_tag || 'latest' }}
            nhothoang/water-app-backend:${{ github.sha }}
          cache-from: type=registry,ref=nhothoang/water-app-backend:buildcache
          cache-to: type=registry,ref=nhothoang/water-app-backend:buildcache,mode=max
